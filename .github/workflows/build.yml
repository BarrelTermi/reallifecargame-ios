name: Build iOS IPA
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Expo CLI and EAS CLI
        run: npm install -g expo-cli eas-cli

      - name: Generate App Config
        run: |
          echo '{
            "expo": {
              "name": "RealLifeCarGame",
              "slug": "reallifecargame",
              "version": "1.0.0",
              "ios": {
                "bundleIdentifier": "com.barreltermi.reallifecargame"
              }
            }
          }' > app.json

      - name: Install Project Dependencies
        run: npm install || npm install --legacy-peer-deps

      - name: Build Native iOS Project
        run: npx expo prebuild --platform ios

      - name: Create Unsigned IPA Package
        run: |
          mkdir -p build/Payload
          mv ios/build/Build/Products/Debug-iphonesimulator/*.app build/Payload/ 2>/dev/null || mv ios/*.app build/Payload/ || mv ios/build/Build/Products/*/*.app build/Payload/ || true
          cd build
          zip -r ../RealLifeCarGame.ipa Payload

      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealLifeCarGame-IPA
          path: RealLifeCarGame.ipa

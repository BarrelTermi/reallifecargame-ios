name: Build iOS IPA
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Generate App Config
        run: |
          echo '{
            "expo": {
              "name": "RealLifeCarGame",
              "slug": "reallifecargame",
              "version": "1.0.0",
              "ios": {
                "bundleIdentifier": "com.barreltermi.reallifecargame"
              }
            }
          }' > app.json

      - name: Install Project Dependencies
        run: npm install

      - name: Build Native iOS Folder
        run: npx expo prebuild --platform ios

      - name: Compile Xcode Workspace
        run: |
          cd ios
          xcodebuild -workspace RealLifeCarGame.xcworkspace \
                     -scheme RealLifeCarGame \
                     -configuration Debug \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Package into True IPA
        run: |
          mkdir -p build/Payload
          cp -R ios/build/Build/Products/Debug-iphoneos/*.app build/Payload/ 2>/dev/null || cp -R ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Debug-iphoneos/*.app build/Payload/ || true
          cd build
          zip -r ../RealLifeCarGame.ipa Payload

      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealLifeCarGame-Native-IPA
          path: RealLifeCarGame.ipa
